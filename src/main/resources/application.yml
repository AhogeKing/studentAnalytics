server:
  port: 8081
  servlet:
    context-path: /StudentAnalytics

spring:
  config:
    import:
      - optional:classpath:jwt.yml
      - optional:file:./python/importer/.env[.properties]
  application:
    name: student-analytics
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:student_analytics}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
    hikari:
      initialization-fail-timeout: -1
      connection-init-sql: USE student_analytics

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

ml:
  python-path: ${ML_PYTHON_PATH:python/venv/bin/python}
  project-root: .
  script-dir: python/ml
  train-script-name: train_decision.py
  predict-script-name: predict_descision.py
  dataset-path: dataset/Student_performance_data_.csv
  artifact-dir: python/ml/artifacts
  model-root-dir: runtime/ml/models
  prediction-temp-dir: runtime/ml/predictions
  train-timeout-seconds: 600
  predict-timeout-seconds: 60
